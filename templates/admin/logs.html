{% extends "base_admin.html" %}
{% block title %}系统日志 - 管理员{% endblock %}
{% block content %}
<div class="card shadow-sm p-3 mb-3">
  <div class="d-flex justify-content-between align-items-center">
    <h3 class="mb-0">系统日志</h3>
    <a class="btn btn-outline-secondary btn-sm" href="/sysadmin/ui">返回控制台</a>
  </div>
</div>

<div class="card shadow-sm p-0">
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
      <thead><tr><th>类型</th><th>时间</th><th>关联</th><th>数额</th><th>描述</th></tr></thead>
      <tbody id="ltb"></tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block body_script %}
<script>
function loadLogs(){
  getJson('/sysadmin/logs/list').then(r=>{
    const tb = document.getElementById('ltb');
    tb.innerHTML='';
    (r.items||[]).forEach(x=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${x.类型}</td><td>${x.时间}</td><td>${x.关联}</td><td>${x.数额||''}</td><td>${x.描述||''}</td>`;
      tb.appendChild(tr);
    })
  })
}
document.addEventListener('DOMContentLoaded', loadLogs);
</script>
{% endblock %}
