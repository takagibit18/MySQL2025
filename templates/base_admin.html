<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}系统管理员{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#f7f7f9}
        .navbar-brand{font-weight:600}
        .container-narrow{max-width:1000px}
        .table thead th{background:#f0f2f5}
    </style>
    {% block head %}{% endblock %}
    <script>
        function postJson(url, data){
            return fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body:JSON.stringify(data||{})}).then(r=>r.json());
        }
        function getJson(url){ return fetch(url, {credentials:'same-origin'}).then(r=>r.json()); }
    </script>
    {% block head_script %}{% endblock %}
    {% csrf_token %}
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container container-narrow">
    <a class="navbar-brand" href="/sysadmin/ui">系统管理员 - 机票预订</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample" aria-controls="navbarsExample" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarsExample">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/ui/search">航班查询</a></li>
      </ul>
      <div class="d-flex">
        {% if request.session.admin_id %}
          <span class="navbar-text me-3">欢迎，{{ request.session.admin_name }}</span>
          <button class="btn btn-outline-light btn-sm" onclick="logoutDo()">退出</button>
        {% else %}
          <a class="btn btn-light btn-sm" href="/sysadmin/ui/login">登录</a>
        {% endif %}
      </div>
    </div>
  </div>
  </nav>

<main class="container container-narrow my-4">
    {% block content %}{% endblock %}
</main>

<div class="container container-narrow">
  <div id="globalAlert" class="alert d-none" role="alert"></div>
  <footer class="text-muted py-3">© 简易机票预订示例</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function logoutDo(){
  postJson('/sysadmin/api/logout', {}).then(()=>{ window.location.href='/sysadmin/ui/login'; });
}
</script>
{% block body_script %}{% endblock %}
</body>
</html>
