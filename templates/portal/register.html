{% extends "base.html" %}
{% block title %}注册 - 机票系统{% endblock %}
{% block content %}
<div class="card shadow-sm p-4">
  <h3 class="mb-3">注册</h3>
  <form id="regForm" class="row g-3">
    <div class="col-12 col-md-4">
      <label class="form-label">用户ID（身份证号）</label>
      <input class="form-control" name="user_id" placeholder="18位身份证号" required>
    </div>
    <div class="col-12 col-md-4">
      <label class="form-label">用户名</label>
      <input class="form-control" name="username" required>
    </div>
    <div class="col-12 col-md-4">
      <label class="form-label">密码</label>
      <input class="form-control" type="password" name="password" required>
    </div>
    <div class="col-12 col-md-4">
      <label class="form-label">姓名</label>
      <input class="form-control" name="name" required>
    </div>
    <div class="col-12 col-md-4">
      <label class="form-label">性别</label>
      <select class="form-select" name="gender" required>
        <option value="">请选择</option>
        <option value="男">男</option>
        <option value="女">女</option>
      </select>
    </div>
    <div class="col-12 col-md-4">
      <label class="form-label">手机号</label>
      <input class="form-control" name="phone" placeholder="1开头11位" required>
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">邮箱</label>
      <input class="form-control" type="email" name="email" required>
    </div>
    <div class="col-12">
      <button class="btn btn-primary" type="button" onclick="submitRegister()">注册</button>
      <a class="btn btn-link" href="/ui/login">已有账号？去登录</a>
    </div>
  </form>
</div>
{% endblock %}

{% block body_script %}
<script>
function submitRegister(){
  const f = document.getElementById('regForm');
  const data = Object.fromEntries(new FormData(f).entries());
  postJson('/api/register', data).then(r=>{
    if(r && r.ok){
      alert('注册成功，请登录');
      window.location.href = '/ui/login';
    }else{
      alert(r && r.error ? r.error : '注册失败');
    }
  }).catch(()=>alert('网络错误'));
}
</script>
{% endblock %}
