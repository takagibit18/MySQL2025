{% extends "base.html" %}
{% block title %}我的资料 - 机票系统{% endblock %}
{% block content %}
<div class="card shadow-sm p-4">
  <h3 class="mb-3">我的资料</h3>
  <form id="profileForm" class="row g-3">
    <div class="col-12 col-md-6">
      <label class="form-label">姓名</label>
      <input class="form-control" name="name" value="{{ user.姓名 }}" required>
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">性别</label>
      <select class="form-select" name="gender" required>
        <option value="男" {% if user.性别 == '男' %}selected{% endif %}>男</option>
        <option value="女" {% if user.性别 == '女' %}selected{% endif %}>女</option>
      </select>
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">手机号</label>
      <input class="form-control" name="phone" value="{{ user.手机号 }}" required>
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">邮箱</label>
      <input class="form-control" type="email" name="email" value="{{ user.邮箱 }}" required>
    </div>
    <div class="col-12">
      <button class="btn btn-primary" type="button" onclick="saveProfile()">保存</button>
    </div>
  </form>
</div>
{% endblock %}

{% block body_script %}
<script>
function saveProfile(){
  const f = document.getElementById('profileForm');
  const data = Object.fromEntries(new FormData(f).entries());
  postJson('/api/update-profile', data).then(r=>{
    if(r && r.ok){ alert('保存成功'); } else { alert(r.error||'保存失败'); }
  });
}
</script>
{% endblock %}
