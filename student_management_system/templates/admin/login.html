<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理员登录 - 智慧门户</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%); min-height:100vh; display:flex; align-items:center; justify-content:center;}
        .login-card{max-width:420px; width:100%; background:#fff; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.1); padding:40px;}
        .login-logo{text-align:center; margin-bottom:30px;}
        .login-logo img{height:50px;}
        .login-title{text-align:center; color:#333; margin-bottom:25px; font-size:20px;}
        .btn-login{background-color:#9c1e24; border-color:#9c1e24; width:100%; padding:10px;}
        .btn-login:hover{background-color:#7d181d; border-color:#7d181d;}
    </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <img src="/static/img/img_1.png" alt="中央民族大学智慧门户">
  </div>
  <h4 class="login-title">管理员登录</h4>
  <form method="post" action="/admin_portal/api/login">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">管理员ID</label>
      <input class="form-control" type="text" name="admin_id" required placeholder="请输入管理员ID">
    </div>
    <div class="mb-3">
      <label class="form-label">密码</label>
      <input class="form-control" type="password" name="password" required placeholder="请输入密码">
    </div>
    <div class="mb-3">
      <button class="btn btn-primary btn-login" type="submit">登 录</button>
    </div>
    <div class="text-center text-muted" style="font-size:13px;">
      测试账号：ADMIN001，密码：admin123
    </div>
  </form>
</div>
</body>
</html>
