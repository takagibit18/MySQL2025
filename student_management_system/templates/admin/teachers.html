{% extends "admin/base_admin.html" %}
{% block title %}教师管理{% endblock %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h4>教师管理</h4>
    <button class="btn btn-primary btn-sm" onclick="showEditModal('teacher', null)">添加教师</button>
  </div>
  <div class="card-body">
    <div id="teachersTable">
      <div class="text-center">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">加载中...</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 更改模态框 -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editModalTitle">更改教师信息</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="editModalContent"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-danger" id="deleteBtn" onclick="deleteItem()" style="display:none;">删除</button>
        <button type="button" class="btn btn-primary" onclick="saveItem()">保存</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block body_script %}
<script>
let currentType = 'teacher';
let currentId = '';
let editModal = null;

(function(){
  editModal = new bootstrap.Modal(document.getElementById('editModal'));
  
  function loadTeachers(){
    getJson('/admin_portal/teachers/list').then(data=>{
      const tbody = document.getElementById('teachersTable');
      if(data.items && data.items.length > 0){
        let html = '<table class="table table-striped"><thead><tr><th>工号</th><th>姓名</th><th>性别</th><th>手机号</th><th>邮箱</th><th>职称</th><th>部门</th><th>状态</th><th>操作</th></tr></thead><tbody>';
        data.items.forEach(item=>{
          html += `<tr>
            <td>${item.工号}</td>
            <td>${item.姓名}</td>
            <td>${item.性别==='M'?'男':'女'}</td>
            <td>${item.手机号}</td>
            <td>${item.邮箱||''}</td>
            <td>${item.职称||''}</td>
            <td>${item.部门||''}</td>
            <td>${item.状态==1?'在职':'离职'}</td>
            <td><button class="btn btn-sm btn-primary" onclick="showEditModal('teacher', '${item.工号}')">更改</button></td>
          </tr>`;
        });
        html += '</tbody></table>';
        tbody.innerHTML = html;
      } else {
        tbody.innerHTML = '<p class="text-muted">暂无教师记录</p>';
      }
    });
  }
  
  window.showEditModal = function(type, id){
    currentType = type;
    currentId = id;
    const title = id ? '更改教师信息' : '添加教师';
    document.getElementById('editModalTitle').textContent = title;
    document.getElementById('deleteBtn').style.display = id ? 'inline-block' : 'none';
    
    if(id){
      getJson(`/admin_portal/teachers/detail?工号=${id}`).then(data=>{
        if(data.item){
          showEditForm(data.item);
          editModal.show();
        }
      });
    } else {
      showEditForm({});
      editModal.show();
    }
  };
  
  window.deleteItem = function(){
    if(confirm('确定要删除这条记录吗？')){
      postJson(`/admin_portal/teachers/delete`, {工号: currentId}).then(data=>{
        if(data.ok){
          showAlert('删除成功');
          editModal.hide();
          loadTeachers();
        } else {
          showAlert(data.error || '删除失败', 'danger');
        }
      });
    }
  };
  
  window.saveItem = function(){
    const formData = {};
    const inputs = document.querySelectorAll('#editModalContent input, #editModalContent select');
    inputs.forEach(input=>{
      if(input.name){
        formData[input.name] = input.value;
      }
    });
    
    postJson(`/admin_portal/teachers/save`, formData).then(data=>{
      if(data.ok){
        showAlert('保存成功');
        editModal.hide();
        loadTeachers();
      } else {
        showAlert(data.error || '保存失败', 'danger');
      }
    });
  };
  
  function showEditForm(item){
    const isEdit = !!currentId;
    let html = `
      <form id="editForm">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">工号 ${isEdit?'<span class="text-muted">(不可修改)</span>':''}</label>
            <input type="text" class="form-control" name="工号" value="${item.工号||''}" ${isEdit?'readonly':''} required>
          </div>
          <div class="col-md-6">
            <label class="form-label">姓名</label>
            <input type="text" class="form-control" name="姓名" value="${item.姓名||''}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">性别</label>
            <select class="form-select" name="性别" required>
              <option value="M" ${item.性别==='M'?'selected':''}>男</option>
              <option value="F" ${item.性别==='F'?'selected':''}>女</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">手机号</label>
            <input type="text" class="form-control" name="手机号" value="${item.手机号||''}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">邮箱</label>
            <input type="email" class="form-control" name="邮箱" value="${item.邮箱||''}">
          </div>
          <div class="col-md-6">
            <label class="form-label">职称</label>
            <input type="text" class="form-control" name="职称" value="${item.职称||''}">
          </div>
          <div class="col-md-6">
            <label class="form-label">部门</label>
            <input type="text" class="form-control" name="部门" value="${item.部门||''}">
          </div>
          <div class="col-md-6">
            <label class="form-label">密码</label>
            <input type="password" class="form-control" name="密码" value="${item.密码||'123456'}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">状态</label>
            <select class="form-select" name="状态" required>
              <option value="1" ${item.状态==1?'selected':''}>在职</option>
              <option value="0" ${item.状态==0?'selected':''}>离职</option>
            </select>
          </div>
        </div>
      </form>
    `;
    document.getElementById('editModalContent').innerHTML = html;
  }
  
  loadTeachers();
})();
</script>
{% endblock %}
