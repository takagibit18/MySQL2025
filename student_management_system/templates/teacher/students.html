{% extends "teacher/base_teacher.html" %}
{% block title %}学生名单{% endblock %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h4>学生名单</h4>
    <a href="/teacher/ui/courses" class="btn btn-sm btn-secondary">返回课程列表</a>
  </div>
  <div class="card-body">
    <div id="studentsTable">
      <div class="text-center">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">加载中...</span>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block body_script %}
<script>
(function(){
  const urlParams = new URLSearchParams(window.location.search);
  const courseId = urlParams.get('course_id');
  
  function loadStudents(){
    const url = courseId ? `/teacher/students/list?course_id=${courseId}` : '/teacher/students/list';
    getJson(url).then(data=>{
      const tbody = document.getElementById('studentsTable');
      if(data.items && data.items.length > 0){
        let html = '<table class="table table-striped"><thead><tr><th>学号</th><th>姓名</th><th>性别</th><th>手机号</th><th>邮箱</th></tr></thead><tbody>';
        data.items.forEach(item=>{
          html += `<tr>
            <td>${item.学号}</td>
            <td>${item.姓名}</td>
            <td>${item.性别==='M'?'男':'女'}</td>
            <td>${item.手机号}</td>
            <td>${item.邮箱||''}</td>
          </tr>`;
        });
        html += '</tbody></table>';
        tbody.innerHTML = html;
      } else {
        tbody.innerHTML = '<p class="text-muted">暂无学生记录</p>';
      }
    });
  }
  loadStudents();
})();
</script>
{% endblock %}
